name: tests

# Personal project — runs the suite on push so I catch regressions between
# sessions. No multi-OS / multi-Python matrix; just my actual environment
# (Windows, Python 3.12). Suite is offline-only so no secrets needed.

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  test:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install package in editable mode with dev extras
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Run pytest
        run: python -m pytest tests/ -v --tb=short
