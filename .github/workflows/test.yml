name: tests

# Runs the full pytest suite (including the --run-slow integration lane)
# on every PR + every push to master/main + every push to a feature/* or
# claude/* branch + manual dispatch. Pre-2026-05-19 the workflow only
# fired on push-to-master, which meant PR #2's merge-time CI failure
# (a flaky color-identity test + missing flask extra) wasn't caught
# until master was already broken.
#
# Matrix Python 3.10/3.11/3.12 on ubuntu-latest. The suite is OS-
# agnostic by design (the few Windows-only edge cases — cp1252,
# deck-path doubling — are covered by cross-platform tests that
# exercise both encodings explicitly). Ubuntu is faster + cheaper +
# avoids the Windows-runner JS-action deprecation warnings.
#
# Spec lives in docs/AGENT_BACKLOG.md item #005.

on:
  push:
    branches:
      - master
      - main
  pull_request:
    branches:
      - master
      - main
  workflow_dispatch:
# Push-trigger is intentionally master/main only. Feature branches
# (feature/** / claude/**) get CI via the pull_request trigger when
# they're attached to an open PR — which is the only time the run
# really matters. Previously triggering on every feature-branch push
# AND on the PR fired two parallel matrix runs per push (caught on
# PR #3, 2026-05-19) — wasted CI minutes for zero added signal.

# Cancel any in-flight runs for the same ref when a new push lands —
# saves CI minutes on rapid-fire pushes.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Opt all JavaScript actions into the Node 24 runtime. GitHub is
# removing Node 20 from runners on 2026-09-16; until ``actions/checkout``
# and ``actions/setup-python`` ship versions that target Node 24
# natively, this env var keeps us on the supported runtime without
# a deprecation warning on every run. See AGENT_BACKLOG #005's
# ``new_during_work`` notes.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install package + all test-relevant extras
        # ``[claude]`` pulls anthropic so the auto-curate path imports
        # cleanly under test stubs. ``[web]`` pulls flask so the
        # routes_* test modules can import (without it 4 test files
        # skip silently and we lose coverage). ``[test]`` pulls
        # pytest + pytest-cov. ``[clipboard]`` pulls pyperclip for
        # the Moxfield push tests.
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[claude,web,test,clipboard]"

      - name: Run pytest (full lane, includes --run-slow)
        run: |
          python -m pytest --run-slow --no-header -q --tb=short

  secret-scan:
    # Full-tree secret sweep. The pre-commit hook only protects
    # contributors who installed it locally (and is bypassable via
    # --no-verify); this job covers everyone else by scanning every
    # git-tracked file on each PR / push. Runs OUTSIDE the Python
    # matrix — the scanner is pure stdlib and its result doesn't vary
    # by interpreter version, so one run is signal and three are spend.
    # No pip install either: checkout + the runner's python3 keeps the
    # job to a few seconds and removes the only realistic flake source
    # (dependency resolution).
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Scan all tracked files for secrets
        # --all enumerates via `git ls-files -z`, so only committed
        # content is scanned (no build artifacts) and filenames with
        # spaces/brackets are handled safely.
        run: python3 scripts/pre_commit_secret_scan.py --all
