# FP-010: build the Commander Builder desktop EXE on a Windows runner.
# PyInstaller is not a cross-compiler, so this must run on windows-latest.
# Triggers on version tags (v*) and manual dispatch; not on every push.
name: build-desktop

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build-windows-exe:
    runs-on: windows-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install package + desktop build deps
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[desktop]"

      - name: Build the one-folder EXE
        run: python scripts/build_desktop.py

      - name: Sanity-check the EXE was produced
        shell: pwsh
        run: |
          $exe = "dist/CommanderBuilder/CommanderBuilder.exe"
          if (-not (Test-Path $exe)) { throw "EXE not found at $exe" }
          "built: $((Get-Item $exe).Length) bytes"

      - name: Upload EXE artifact
        uses: actions/upload-artifact@v4
        with:
          name: CommanderBuilder-windows
          path: dist/CommanderBuilder/
          if-no-files-found: error
          retention-days: 14
